name: Python CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirement.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirement.txt
          python -m pip install pytest ruff

      - name: Compile Python sources
        run: python -W error::SyntaxWarning -m compileall -q src tests

      - name: Validate browser JavaScript
        run: |
          node --check src/www/settings.js
          node --check src/www/help-content.js
          node tests/js/nolworld_schedule.test.js

      - name: Run Ruff correctness checks
        run: ruff check src tests

      - name: Run tests
        run: pytest

      - name: Import application
        shell: pwsh
        run: |
          $env:PYTHONPATH = (Resolve-Path "src")
          python -c "import nodriver_tixcraft; print('nodriver_tixcraft import: OK')"
          python -c "from platforms.registry import PLATFORM_MODULES; import importlib; [importlib.import_module(name) for name in PLATFORM_MODULES.values()]; print(f'{len(PLATFORM_MODULES)} platform modules import: OK')"
