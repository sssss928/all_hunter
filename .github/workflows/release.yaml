name: Build Windows Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Semantic version tag, for example v1.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirement.txt

      - name: Determine release metadata
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }

          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Tag must use semantic version format such as v1.0.1"
          }

          $version = $tag.Substring(1)
          $zipName = "tickets_hunter_v${version}_windows_x64.zip"
          $sourceName = "myhunter-${version}-source.zip"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "source_name=$sourceName" >> $env:GITHUB_OUTPUT

      - name: Install dependencies and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirement.txt
          python -m pip install pyinstaller pytest ruff

      - name: Validate browser JavaScript
        run: |
          node --check src/www/settings.js
          node --check src/www/help-content.js
          node tests/js/nolworld_schedule.test.js

      - name: Build and validate Windows package
        shell: pwsh
        run: |
          ./build_scripts/build_release.ps1 -Version "${{ steps.release.outputs.version }}"

      - name: Build source package
        shell: pwsh
        run: |
          ./build_scripts/build_source.ps1 -Version "${{ steps.release.outputs.version }}"

      - name: Smoke-test packaged applications
        shell: pwsh
        run: |
          $exe = "dist/release/tickets_hunter_v${{ steps.release.outputs.version }}/nodriver_tixcraft.exe"
          & $exe --help
          if ($LASTEXITCODE -ne 0) {
            throw "Packaged nodriver_tixcraft.exe failed its CLI smoke test"
          }

          $packageRoot = "dist/release/tickets_hunter_v${{ steps.release.outputs.version }}"
          $settingsExe = Join-Path $packageRoot "settings.exe"
          $env:BROWSER = "C:\Windows\System32\cmd.exe /c exit"
          $process = Start-Process `
            -FilePath $settingsExe `
            -WorkingDirectory $packageRoot `
            -WindowStyle Hidden `
            -PassThru

          try {
            $ready = $false
            for ($attempt = 0; $attempt -lt 30; $attempt++) {
              Start-Sleep -Milliseconds 500
              try {
                $response = Invoke-WebRequest `
                  -Uri "http://127.0.0.1:16888/settings.html" `
                  -UseBasicParsing `
                  -TimeoutSec 2
                if ($response.StatusCode -eq 200 -and $response.Content -match "<html") {
                  $ready = $true
                  break
                }
              } catch {
              }
            }

            if (-not $ready) {
              throw "Packaged settings.exe did not serve /settings.html"
            }

            if ($response.Content -notmatch "nol_check_interval") {
              throw "Packaged settings page is missing the NOL World controls"
            }
            if (
              $response.Content -notmatch "nolworld_account" -or
              $response.Content -notmatch "nol_session_timeout_minutes" -or
              $response.Content -notmatch "auto-reload-page-interval-row"
            ) {
              throw "Packaged settings page is missing the NOL login or session controls"
            }

            $configResponse = Invoke-WebRequest `
              -Uri "http://127.0.0.1:16888/load" `
              -UseBasicParsing `
              -TimeoutSec 3
            $config = $configResponse.Content | ConvertFrom-Json
            if ($null -eq $config.nolworld -or $config.nolworld.check_interval -lt 3) {
              throw "Packaged settings defaults are missing the NOL World section"
            }
            if (
              $config.nolworld.session_timeout_minutes -ne 10 -or
              $config.nolworld.security_handoff -ne $true -or
              $null -eq $config.accounts.nolworld_account -or
              $null -eq $config.accounts.nolworld_password -or
              $config.ocr_captcha.force_submit -ne $false
            ) {
              throw "Packaged settings defaults are missing safe NOL login/session fields"
            }

            $favicon = Invoke-WebRequest `
              -Uri "http://127.0.0.1:16888/favicon.ico" `
              -UseBasicParsing `
              -TimeoutSec 3
            if ($favicon.StatusCode -ne 200) {
              throw "Packaged settings.exe did not serve /favicon.ico"
            }
          }
          finally {
            try {
              Invoke-WebRequest `
                -Uri "http://127.0.0.1:16888/shutdown" `
                -UseBasicParsing `
                -TimeoutSec 3 | Out-Null
            } catch {
            }
            if (-not $process.WaitForExit(5000)) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: tickets-hunter-windows-${{ steps.release.outputs.version }}
          path: |
            dist/release/${{ steps.release.outputs.zip_name }}
            dist/release/${{ steps.release.outputs.zip_name }}.sha256
            dist/source/${{ steps.release.outputs.source_name }}
            dist/source/${{ steps.release.outputs.source_name }}.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: MyHunter ${{ steps.release.outputs.version }}
          generate_release_notes: true
          files: |
            dist/release/${{ steps.release.outputs.zip_name }}
            dist/release/${{ steps.release.outputs.zip_name }}.sha256
            dist/source/${{ steps.release.outputs.source_name }}
            dist/source/${{ steps.release.outputs.source_name }}.sha256
          fail_on_unmatched_files: true
          make_latest: true
